databases:
  - name: neuralgrid-lite-db
    databaseName: neuralgrid_lite
    user: neuralgrid_lite
    plan: free

services:
  # ── Backend (FastAPI via Docker) ───────────────────────────────────────────
  - type: web
    name: neuralgrid-lite-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: neuralgrid-lite-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://neuralgrid-lite-frontend.onrender.com
      - key: STATIC_DIR
        value: ""
      - key: PYTHONUNBUFFERED
        value: "1"

  # ── Frontend (Vite → static site, always free) ────────────────────────────
  - type: web
    name: neuralgrid-lite-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://neuralgrid-lite-backend.onrender.com
